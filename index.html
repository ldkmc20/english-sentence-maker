<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>영어 문장 만들기</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="앱 상태">
        <div>
          <p class="eyebrow">Korean speech to English</p>
          <h1>영어 문장 만들기</h1>
        </div>
        <div id="supportBadge" class="support-badge">확인 중</div>
      </section>

      <section class="control-surface" aria-label="음성 인식 제어">
        <div class="meter">
          <div id="pulse" class="pulse" aria-hidden="true"></div>
          <div>
            <strong id="sessionState">대기 중</strong>
            <span id="sessionTime">00:00:00</span>
          </div>
        </div>
        <div class="controls">
          <button id="startBtn" class="primary" type="button">녹음 시작</button>
          <button id="stopBtn" type="button" disabled>정지</button>
          <button id="clearBtn" class="danger" type="button">오늘 기록 삭제</button>
        </div>
        <p id="statusLine" class="status-line">마이크 권한을 허용하면 한국어 음성을 문장 단위로 저장합니다.</p>
      </section>

      <section class="grid">
        <article class="panel transcript-panel">
          <div class="panel-header">
            <div>
              <h2>오늘 말한 한국어</h2>
              <p id="utteranceCount">0개 문장</p>
            </div>
            <button id="exportBtn" type="button">내보내기</button>
          </div>
          <div id="interimText" class="interim" aria-live="polite"></div>
          <ol id="transcriptList" class="transcript-list"></ol>
        </article>

        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>많이 쓴 문장</h2>
              <p>반복 횟수 기준</p>
            </div>
            <button id="refreshBtn" type="button">새로고침</button>
          </div>
          <div id="frequentList" class="frequent-list"></div>
        </article>
      </section>

      <section class="panel english-panel">
        <div class="panel-header">
          <div>
            <h2>영어 문장 정리</h2>
            <p>OpenAI API 키를 넣으면 바로 영작합니다.</p>
          </div>
          <button id="copyPromptBtn" type="button">프롬프트 복사</button>
        </div>

        <div class="settings">
          <label>
            <span>OpenAI API 키</span>
            <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
          </label>
          <label>
            <span>모델</span>
            <input id="modelName" type="text" value="gpt-4.1-mini" />
          </label>
          <button id="generateBtn" class="primary" type="button">영어로 정리</button>
        </div>

        <div id="englishOutput" class="english-output" aria-live="polite">
          자주 나온 한국어 문장이 쌓이면 여기에 자연스러운 영어 문장, 짧은 설명, 다시 말하기 연습 문장이 정리됩니다.
        </div>
      </section>
    </main>

    <template id="frequentItemTemplate">
      <div class="frequent-item">
        <div>
          <strong></strong>
          <span></span>
        </div>
        <button type="button">선택</button>
      </div>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
